<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Checkout - YSL Fragrance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bm-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 0.5rem; display: block; color: #666; }
        .form-control, .form-select { border-radius: 0; border: 1px solid #e0e0e0; padding: 0.75rem; }
        .form-control:focus { border-color: #000; box-shadow: none; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar bg-white border-bottom mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">YSL</a>
        <span class="bm-label m-0 text-dark">SECURE ENCRYPTED CHECKOUT</span>
    </div>
</nav>

<div class="container pb-5">
    <div class="row g-4">
        <!-- FORM DATA PEMBELI -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4 mb-4">
                <h5 class="fw-bold mb-4 border-bottom pb-2">1. INFORMASI KONTAK</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="bm-label">EMAIL ADDRESS*</label>
                        <input type="email" class="form-control" placeholder="nama@email.com">
                    </div>
                    <div class="col-md-6">
                        <label class="bm-label">NOMOR TELEPON/WA*</label>
                        <input type="tel" class="form-control" placeholder="+62 812...">
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4 mb-4">
                <h5 class="fw-bold mb-4 border-bottom pb-2">2. ALAMAT PENGIRIMAN</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="bm-label">NAMA DEPAN*</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="bm-label">NAMA BELAKANG*</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="bm-label">ALAMAT LENGKAP*</label>
                        <input type="text" class="form-control" placeholder="Nama jalan, No Rumah, Komplek...">
                    </div>
                    <div class="col-md-4">
                        <label class="bm-label">PROVINSI*</label>
                        <select class="form-select">
                            <option selected disabled>Pilih Provinsi</option>
                            <option>DKI Jakarta</option>
                            <option>Jawa Barat</option>
                            <option>Jawa Tengah</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="bm-label">KOTA/KABUPATEN*</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="bm-label">KODE POS*</label>
                        <input type="text" class="form-control">
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm p-4">
                <h5 class="fw-bold mb-4 border-bottom pb-2">3. PILIH PRODUK ANDA</h5>
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="bm-label">VARIAN PARFUM</label>
                        <select class="form-select" id="productSelect">
                            <option value="1380000" data-img="https://images.unsplash.com/photo-1594035910387-fea47794261f?w=60">MYSLF Eau de Parfum - Rp 1.380.000</option>
                            <option value="1850000" data-img="https://images.unsplash.com/photo-1541643600914-78b084683601?w=60">Black Opium Extreme - Rp 1.850.000</option>
                            <option value="2100000" data-img="https://images.unsplash.com/photo-1557170334-a9632e77c6e4?w=60">Libre Intense - Rp 2.100.000</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="bm-label">KUANTITAS</label>
                        <input type="number" class="form-control" id="productQty" value="1" min="1">
                    </div>
                </div>
            </div>
        </div>

        <!-- RINGKASAN PESANAN -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 100px; z-index: 10;">
                <h5 class="fw-bold mb-4">RINGKASAN ANDA</h5>
                
                <div class="d-flex align-items-center mb-3">
                    <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?w=60" id="summaryImg" class="rounded me-3" width="60" height="60" style="object-fit: cover;">
                    <div class="overflow-hidden">
                        <h6 class="small fw-bold mb-0 text-truncate" id="summaryName">MYSLF Eau de Parfum</h6>
                        <small class="text-muted">Qty: <span id="summaryQty">1</span></small>
                    </div>
                    <span class="ms-auto small fw-bold text-nowrap" id="itemPrice">Rp 1.380.000</span>
                </div>

                <hr>
                
                <div class="d-flex justify-content-between mb-2">
                    <span class="small">Subtotal</span>
                    <span class="small" id="subtotalPrice">Rp 1.380.000</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="small">Pengiriman</span>
                    <span class="small text-success fw-bold">GRATIS</span>
                </div>
                <div class="d-flex justify-content-between mb-4 mt-2">
                    <span class="fw-bold">TOTAL</span>
                    <span class="fw-bold h5 mb-0 text-dark" id="totalPrice">Rp 1.380.000</span>
                </div>

                <button class="btn btn-dark w-100 py-3 fw-bold rounded-0" style="letter-spacing: 2px;">PROSES PEMBAYARAN</button>
            </div>
        </div>
    </div>
</div>

<script>
    const productSelect = document.getElementById('productSelect');
    const productQty = document.getElementById('productQty');
    
    function updateSummary() {
        const selectedOption = productSelect.options[productSelect.selectedIndex];
        const price = parseInt(productSelect.value);
        const qty = parseInt(productQty.value) || 1;
        const img = selectedOption.getAttribute('data-img');
        const name = selectedOption.text.split(' - ')[0];

        const total = price * qty;

        // Update UI
        document.getElementById('summaryImg').src = img;
        document.getElementById('summaryName').innerText = name;
        document.getElementById('summaryQty').innerText = qty;
        document.getElementById('itemPrice').innerText = 'Rp ' + price.toLocaleString('id-ID');
        document.getElementById('subtotalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
        document.getElementById('totalPrice').innerText = 'Rp ' + total.toLocaleString('id-ID');
    }

    productSelect.addEventListener('change', updateSummary);
    productQty.addEventListener('input', updateSummary);
</script>

</body>
</html>
