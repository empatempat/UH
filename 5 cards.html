<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danganronpa THH – Final Characters</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        background: #0f0f0f;
        color: white;
        margin: 0;
        padding: 40px;
        text-align: center;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 25px;
        letter-spacing: 2px;
        color: #ff2e74;
        text-shadow: 0 0 10px #ff2e74;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 30px;
        padding: 20px;
    }

    .card {
        background: #1a1a1a;
        border: 2px solid #ff2e74;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(255,46,116,0.4);
        transition: 0.25s;
    }

    .card:hover {
        transform: translateY(-6px);
        box-shadow: 0 0 25px rgba(255,46,116,0.7);
    }

    .card img {
        width: 100%;
        height: 250px;
        object-fit: cover;
    }

    .name {
        font-size: 22px;
        margin: 12px 0 5px 0;
        font-weight: bold;
        color: #ff8dbc;
    }

    .stat-box {
        padding: 10px 20px 20px 20px;
        text-align: left;
    }

    .stat-label {
        font-size: 14px;
        margin-top: 12px;
    }

    .bar {
        background: #333;
        width: 100%;
        height: 12px;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 4px;
    }

    .fill {
        height: 100%;
        background: linear-gradient(90deg, #ff2e74, #ff8dbc);
        border-radius: 6px;
    }
</style>
</head>

<body>

<h1>Danganronpa THH</h1>

<div class="grid">

    <div class="card">
        <img src="https://i.pinimg.com/736x/07/b8/74/07b874155555d38627412c16b5e01bd3.jpg">
        <div class="stat-box">
            <div class="name">Makoto Naegi</div>

            <div class="stat-label">Hope</div>
            <div class="bar"><div class="fill" style="width: 95%;"></div></div>

            <div class="stat-label">Influence</div>
            <div class="bar"><div class="fill" style="width: 70%;"></div></div>

            <div class="stat-label">Focus</div>
            <div class="bar"><div class="fill" style="width: 60%;"></div></div>

            <div class="stat-label">Survival</div>
            <div class="bar"><div class="fill" style="width: 90%;"></div></div>

            <div class="stat-label">Skills</div>
            <div class="bar"><div class="fill" style="width: 55%;"></div></div>
        </div>
    </div>

    <div class="card">
        <img src="https://i.pinimg.com/1200x/aa/ee/22/aaee22c13e4e549ecc7d2d6281e5e93a.jpg">
        <div class="stat-box">
            <div class="name">Kyoko Kirigiri</div>

            <div class="stat-label">Hope</div>
            <div class="bar"><div class="fill" style="width: 85%;"></div></div>

            <div class="stat-label">Influence</div>
            <div class="bar"><div class="fill" style="width: 90%;"></div></div>

            <div class="stat-label">Focus</div>
            <div class="bar"><div class="fill" style="width: 95%;"></div></div>

            <div class="stat-label">Survival</div>
            <div class="bar"><div class="fill" style="width: 80%;"></div></div>

            <div class="stat-label">Skills</div>
            <div class="bar"><div class="fill" style="width: 94%;"></div></div>
        </div>
    </div>

    <div class="card">
        <img src="https://i.pinimg.com/736x/8a/95/5d/8a955df4f2ad9c2a22ac9192f1caa1ea.jpg">
        <div class="stat-box">
            <div class="name">Byakuya Togami</div>

            <div class="stat-label">Hope</div>
            <div class="bar"><div class="fill" style="width: 40%;"></div></div>

            <div class="stat-label">Influence</div>
            <div class="bar"><div class="fill" style="width: 95%;"></div></div>

            <div class="stat-label">Focus</div>
            <div class="bar"><div class="fill" style="width: 88%;"></div></div>

            <div class="stat-label">Survival</div>
            <div class="bar"><div class="fill" style="width: 75%;"></div></div>

            <div class="stat-label">Skills</div>
            <div class="bar"><div class="fill" style="width: 82%;"></div></div>
        </div>
    </div>

    <div class="card">
        <img src="https://i.pinimg.com/736x/83/54/04/835404ecb7f8e0ddd17d9ac7e7934c34.jpg">
        <div class="stat-box">
            <div class="name">Aoi Asahina</div>

            <div class="stat-label">Hope</div>
            <div class="bar"><div class="fill" style="width: 72%;"></div></div>

            <div class="stat-label">Influence</div>
            <div class="bar"><div class="fill" style="width: 65%;"></div></div>

            <div class="stat-label">Focus</div>
            <div class="bar"><div class="fill" style="width: 55%;"></div></div>

            <div class="stat-label">Survival</div>
            <div class="bar"><div class="fill" style="width: 78%;"></div></div>

            <div class="stat-label">Skills</div>
            <div class="bar"><div class="fill" style="width: 60%;"></div></div>
        </div>
    </div>

    <div class="card">
        <img src="https://i.pinimg.com/736x/e7/a0/a9/e7a0a92c4ed75b9c5bd2c4b89bc100bc.jpg">
        <div class="stat-box">
            <div class="name">Yasuhiro Hagakure</div>

            <div class="stat-label">Hope</div>
            <div class="bar"><div class="fill" style="width: 30%;"></div></div>

            <div class="stat-label">Influence</div>
            <div class="bar"><div class="fill" style="width: 50%;"></div></div>

            <div class="stat-label">Focus</div>
            <div class="bar"><div class="fill" style="width: 20%;"></div></div>

            <div class="stat-label">Survival</div>
            <div class="bar"><div class="fill" style="width: 65%;"></div></div>

            <div class="stat-label">Skills</div>
            <div class="bar"><div class="fill" style="width: 35%;"></div></div>
        </div>
    </div>

</div>

</body>
</html>
