<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - YSL Fragrance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center min-vh-100 bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <a href="index.html" class="navbar-brand d-block mb-2 text-dark text-decoration-none">YSL</a>
                    <p class="bm-label text-muted">CREATE AN ACCOUNT</p>
                </div>

                <div class="card border-0 shadow-sm p-4 p-md-5">
                    <form>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="bm-label">FIRST NAME</label>
                                <input type="text" class="form-control" placeholder="John">
                            </div>
                            <div class="col-6">
                                <label class="bm-label">LAST NAME</label>
                                <input type="text" class="form-control" placeholder="Doe">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="bm-label">EMAIL ADDRESS</label>
                            <input type="email" class="form-control" placeholder="user@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="bm-label">PHONE NUMBER</label>
                            <input type="tel" class="form-control" placeholder="+62...">
                        </div>

                        <div class="mb-3">
                            <label class="bm-label">PASSWORD</label>
                            <input type="password" class="form-control" placeholder="••••••••">
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input rounded-0" id="terms">
                            <label class="form-check-label small text-muted" for="terms" style="font-size: 11px;">
                                I agree to the <a href="#" class="text-dark fw-bold">Terms & Conditions</a>.
                            </label>
                        </div>

                        <a href="index.html" class="btn btn-dark w-100 py-3 fw-bold rounded-0 text-decoration-none d-block text-center" style="letter-spacing: 2px;">
                            CREATE ACCOUNT
                        </a>

                        <div class="text-center mt-4">
                            <p class="small text-muted mb-0">Sudah punya akun?</p>
                            <a href="login.html" class="text-dark fw-bold small text-decoration-none">MASUK KE AKUN ANDA</a>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted small text-decoration-none">← Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
