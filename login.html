<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - YSL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center vh-100 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card border-0 shadow-lg p-5">
                    <h2 class="navbar-brand text-center d-block mb-4">YSL</h2>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">EMAIL ADDRESS</label>
                            <input type="email" class="form-control" placeholder="user@ysl.id">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">PASSWORD</label>
                            <input type="password" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-dark w-100 py-2 fw-bold rounded-0">LOGIN</button>
                        <div class="text-center mt-3">
                            <small>Belum punya akun? <a href="register.html" class="text-primary">Daftar Sekarang</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
