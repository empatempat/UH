<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Tio</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #000; 
            color: #fff;
        }
        h1 {
            color: #ff7f00; 
        }
        .card-dark {
            background-color: #1a1a1a;
            border: 2px solid #ff7f00;
            color: #fff;
        }
        .btn-orange {
            background-color: #ff7f00;
            border-color: #ff7f00;
            color: #000;
            font-weight: bold;
        }
        .btn-orange:hover {
            background-color: #ffa64d;
            border-color: #ffa64d;
            color: #000;
        }
    </style>

</head>
<body>

    <div class="container py-5">

        <h1 class="text-center mb-5 fw-bold">BIODATA</h1>

        <div class="row text-center">

            <div class="col-md-4 mb-4">
                <div class="p-4 shadow rounded card-dark">
                    <h4>Biodata</h4>
                    <p><strong>Nama:</strong> Tio Ramos Tampubolon</p>
                    <p><strong>Kelas:</strong> Siswa kelas 11 di Kolese Kanisius</p>
                    <p><strong>Alamat:</strong> Pamulang, Tangerang Selatan</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="p-4 shadow rounded card-dark">
                    <h4>Personality</h4>
                    <p>Outgoing, asik</p>
                </div>
            </div>

            <div class="col-md-4 mb-4">
                <div class="p-4 shadow rounded card-dark">
                    <h4>Hobi</h4>
                    <p>Main game, makan, tidur</p>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <div class="btn-group">
                <button class="btn btn-orange">Home</button>
                <button class="btn btn-orange">About</button>
                <button class="btn btn-orange">Contact</button>
            </div>
        </div>

    </div>

</body>
</html>
